name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    environment: pypi
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag matches release name
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          NAME="${{ github.event.release.name }}"
          NAME="${NAME#v}"
          if [ "$TAG" != "$NAME" ]; then
            echo "::error::Release tag '$TAG' does not match release name '$NAME'. Delete this release, fix the tag, and try again."
            exit 1
          fi

      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: |
          pip install --upgrade pip
          pip --version

      - name: Install
        run: python -m pip install build setuptools

      - name: Set version from tag
        if: github.event_name == 'release'
        # This regex looks for the version string in the pyproject.toml file and replaces it with the version from the release tag. Do not change this regex without updating the version string in the pyproject.toml file.
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/version = \"0.0.0-dev\"/version = \"${VERSION}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Verify package version
        if: github.event_name == 'release'
        run: |
          EXPECTED_VERSION="${{ github.ref_name }}"
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"
          WHEEL_FILE=$(ls dist/*.whl)
          ACTUAL_VERSION=$(unzip -p "$WHEEL_FILE" "*/METADATA" | grep "^Version:" | cut -d' ' -f2)
          if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Version mismatch! Expected: $EXPECTED_VERSION, Got: $ACTUAL_VERSION"
            exit 1
          fi
          echo "Version verified: $ACTUAL_VERSION"

      - name: Upload package
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1

  tag-prs-with-release:
    if: github.event_name == 'release'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Label merged PRs with the release tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Find the previous tag reachable from this release's commit (empty if this is the first release).
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="$PREV_TAG..$TAG"
          fi
          echo "Diffing range: $RANGE"

          # Extract PR numbers from squash-merge subjects "... (#123)" and merge-commit subjects "Merge pull request #123 ...".
          PR_NUMBERS=$(git log --pretty=format:%s "$RANGE" \
            | grep -oE '\(#[0-9]+\)$|^Merge pull request #[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -un)

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PRs found in range $RANGE"
            exit 0
          fi

          # Create the release label if it doesn't already exist.
          gh label create "$TAG" --color "0E8A16" --description "Included in release $TAG" 2>/dev/null || true

          for pr in $PR_NUMBERS; do
            echo "Labeling PR #$pr with $TAG"
            gh pr edit "$pr" --add-label "$TAG" || echo "::warning::Failed to label PR #$pr (may not be a PR, or already closed/deleted)"
          done
