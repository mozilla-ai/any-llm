name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/generate_provider_table.py'
      - 'scripts/generate_llms_txt.py'
      - 'scripts/generate_openapi.py'
      - 'scripts/generate_api_docs.py'
      - '.github/workflows/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/generate_provider_table.py'
      - 'scripts/generate_llms_txt.py'
      - 'scripts/generate_openapi.py'
      - 'scripts/generate_api_docs.py'
      - '.github/workflows/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  docs:
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install the latest version of uv and set the python version to 3.13
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          activate-environment: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python dependencies
        run: uv sync --group docs --extra all

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Generate provider table
        run: uv run python scripts/generate_provider_table.py

      - name: Generate OpenAPI spec
        run: uv run python scripts/generate_openapi.py

      - name: Generate API docs
        run: uv run python scripts/generate_api_docs.py

      - name: Build docs
        working-directory: docs
        run: npm run build
        env:
          CI: true

      - name: Generate llms.txt
        run: uv run python scripts/generate_llms_txt.py

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist/any-llm
